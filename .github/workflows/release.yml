name: Release

on:
  push:
    tags:
      - "*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  INNONETWORK_REPOSITORY: InnoSquadCorp/InnoNetwork
  INNONETWORK_REF: codex/split-protobuf-package

jobs:
  validate-release:
    name: Validate Release
    runs-on: macos-15
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Checkout InnoNetwork core
        run: |
          git clone --depth 1 --branch "$INNONETWORK_REF" \
            "https://github.com/${INNONETWORK_REPOSITORY}.git" \
            ../InnoNetwork-release-tag

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Verify docs and stability contract
        run: bash Scripts/check_docs_contract_sync.sh

      - name: Build and run documentation smoke target
        run: |
          xcrun swift build --target InnoNetworkProtobufDocSmoke
          xcrun swift run InnoNetworkProtobufDocSmoke

      - name: Build consumer smoke package
        working-directory: Examples/ConsumerSmoke
        run: xcrun swift build

      - name: Run tests
        run: xcrun swift test

  publish-release:
    name: Publish Release
    needs: validate-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          notes_source="docs/releases/${version}.md"
          notes_target="release-notes.md"

          if [[ -f "$notes_source" ]]; then
            cp "$notes_source" "$notes_target"
          else
            printf '%s\n' \
              "# InnoNetworkProtobuf ${version}" \
              "" \
              "See CHANGELOG.md for the summarized release history." > "$notes_target"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "notes_path=${notes_target}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: InnoNetworkProtobuf ${{ steps.notes.outputs.version }}
          body_path: ${{ steps.notes.outputs.notes_path }}
