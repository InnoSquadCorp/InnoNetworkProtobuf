name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  INNONETWORK_REPOSITORY: InnoSquadCorp/InnoNetwork
  INNONETWORK_REF: codex/split-protobuf-package

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Checkout InnoNetwork core
        run: |
          git clone --depth 1 --branch "$INNONETWORK_REF" \
            "https://github.com/${INNONETWORK_REPOSITORY}.git" \
            ../InnoNetwork-release-tag

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Build
        run: xcrun swift build

      - name: Test
        run: xcrun swift test

  docs-contract-sync:
    name: Docs / Contract Sync
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Checkout InnoNetwork core
        run: |
          git clone --depth 1 --branch "$INNONETWORK_REF" \
            "https://github.com/${INNONETWORK_REPOSITORY}.git" \
            ../InnoNetwork-release-tag

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Verify docs and stability contract
        run: bash Scripts/check_docs_contract_sync.sh

      - name: Build documentation smoke target
        run: xcrun swift build --target InnoNetworkProtobufDocSmoke

      - name: Run documentation smoke target
        run: xcrun swift run InnoNetworkProtobufDocSmoke

  consumer-smoke:
    name: Consumer Smoke
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Checkout InnoNetwork core
        run: |
          git clone --depth 1 --branch "$INNONETWORK_REF" \
            "https://github.com/${INNONETWORK_REPOSITORY}.git" \
            ../InnoNetwork-release-tag

      - name: Build consumer smoke package
        working-directory: Examples/ConsumerSmoke
        run: xcrun swift build
